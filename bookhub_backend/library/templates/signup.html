{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | BOOK HUB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-orange-50 min-h-screen flex items-center justify-center p-6">

    <div class="bg-white w-full max-w-lg rounded-2xl shadow-xl overflow-hidden my-8">
        
        <div class="p-8 pb-0 flex justify-between items-center">
            <a href="{% url 'login' %}" class="text-gray-400 hover:text-orange-600 transition">
                <i class="fas fa-arrow-left mr-2"></i> Back to Login
            </a>
            <div class="text-orange-600 font-bold text-xl tracking-tight">BOOK HUB</div>
        </div>

        <div class="p-8 pt-6">
            <div class="mb-8">
                <h1 class="text-3xl font-bold text-gray-900">Create Account</h1>
                <p class="text-gray-500 mt-2">Join the community of 1 million+ readers.</p>
            </div>

            <form action="{% url 'signup' %}" method="POST" class="space-y-5">
                {% csrf_token %}

                {% if messages %}
                    {% for message in messages %}
                        <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-xl text-sm font-medium text-center shadow-sm">
                            <i class="fas fa-exclamation-circle mr-1"></i> {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">First Name</label>
                        <input type="text" name="first_name" placeholder="John" required
                               class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none focus:border-orange-500 focus:ring-2 focus:ring-orange-200 transition">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Last Name</label>
                        <input type="text" name="last_name" placeholder="Doe" required
                               class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none focus:border-orange-500 focus:ring-2 focus:ring-orange-200 transition">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Email Address</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                            <i class="fas fa-envelope"></i>
                        </span>
                        <input type="email" name="email" placeholder="john@example.com" required
                               class="w-full pl-10 pr-4 py-3 rounded-xl border border-gray-200 outline-none focus:border-orange-500 focus:ring-2 focus:ring-orange-200 transition">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Create Password</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                            <i class="fas fa-lock"></i>
                        </span>
                        <input type="password" name="password" placeholder="••••••••" required
                               class="w-full pl-10 pr-4 py-3 rounded-xl border border-gray-200 outline-none focus:border-orange-500 focus:ring-2 focus:ring-orange-200 transition">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Phone Number</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-500 font-medium text-sm">
                                +91
                            </span>
                            <input type="tel" name="phone" placeholder="9876543210" required
                                   class="w-full pl-12 pr-4 py-3 rounded-xl border border-gray-200 outline-none focus:border-orange-500 focus:ring-2 focus:ring-orange-200 transition">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Pincode</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                                <i class="fas fa-map-marker-alt"></i>
                            </span>
                            <input type="text" name="pincode" maxlength="6" placeholder="560001" required
                                   class="w-full pl-10 pr-4 py-3 rounded-xl border border-gray-200 outline-none focus:border-orange-500 focus:ring-2 focus:ring-orange-200 transition">
                        </div>
                    </div>
                </div>

                <div class="flex items-start">
                    <input type="checkbox" id="terms" required class="mt-1 w-4 h-4 rounded border-gray-300 text-orange-600 focus:ring-orange-500 cursor-pointer">
                    <label for="terms" class="ml-2 text-sm text-gray-600 leading-tight">
                        I agree to the <a href="#" class="text-orange-600 font-semibold hover:underline">Terms of Service</a> and <a href="#" class="text-orange-600 font-semibold hover:underline">Privacy Policy</a>.
                    </label>
                </div>

                <button type="submit" class="w-full bg-orange-600 text-white font-bold py-3 rounded-xl hover:bg-orange-700 shadow-lg shadow-orange-200 transition transform hover:-translate-y-1 active:scale-95">
                    Create Account
                </button>
            </form>

            <p class="mt-8 text-center text-gray-600">
                Already have an account? 
                <a href="{% url 'login' %}" class="text-orange-600 font-bold hover:underline">Login</a>
            </p>
        </div>
    </div>

</body>
</html>
